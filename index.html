<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shoggoth Arena</title>

<style>
body{
background:black;
color:#00ff9c;
font-family:monospace;
text-align:center;
margin-top:80px;
}

#word{
font-size:48px;
margin:40px;
}

button{
font-size:18px;
margin:10px;
padding:10px 20px;
background:#111;
color:#00ff9c;
border:1px solid #00ff9c;
cursor:pointer;
}

.green{color:#00ff9c;}
.red{color:#ff4444;}
</style>
</head>

<body>

<h1>Shoggoth Arena</h1>

<div id="word">---</div>

<button onclick="hit()">Attack</button>
<button onclick="spawn()">Next</button>

<div id="kills">Kills: 0</div>

<script>

const WORDS=[
"flight","night","light","through","thought","rough","tough",
"ghost","ghoul","laugh","craft","draft","stone","storm",
"sound","round","crown","brown","train","trail","bread",
"break","bridge","bright","crowd","found","mount","mouth"
];

let kills=0;

function randomWord(){
return WORDS[Math.floor(Math.random()*WORDS.length)];
}

function spawn(){
document.getElementById("word").innerText=randomWord();
}

function hit(){
let w=document.getElementById("word");
w.className="green";
kills++;
document.getElementById("kills").innerText="Kills: "+kills;
setTimeout(()=>{
w.className="";
spawn();
},200);
}

spawn();

</script>

</body>
</html>
