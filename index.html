<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AngloForge Combat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#0a0f18;
color:white;
font-family:Arial, sans-serif;
text-align:center;
margin:0;
padding:20px;
}

#leaderboard{
border:1px solid #4fc3ff;
padding:10px;
margin-bottom:20px;
background:#111a28;
}

#leaderboard h3{
color:#ffd36b;
margin:5px 0;
}

#enemyWord{
font-size:26px;
color:#ffd36b;
margin-top:10px;
}

.hpbar{
width:200px;
height:12px;
background:#333;
margin:auto;
margin-top:5px;
}

.hpfill{
height:100%;
background:#e74c3c;
width:100%;
}

#enemy-sprite{
font-size:60px;
margin-top:10px;
}

#player-sprite{
font-size:50px;
}

#mora-slots{
margin-top:25px;
}

.slot{
display:inline-block;
width:50px;
height:50px;
border:2px solid #4fc3ff;
margin:4px;
line-height:50px;
font-size:22px;
background:#111a28;
cursor:pointer;
}

.bossSlot{
width:34px;
height:34px;
line-height:34px;
font-size:16px;
margin:2px;
}

#cards{
margin-top:20px;
}

.card{
display:inline-block;
padding:10px 14px;
margin:5px;
border:1px solid #4fc3ff;
background:#162233;
font-size:22px;
cursor:pointer;
}

button{
padding:12px 25px;
margin-top:15px;
font-size:18px;
cursor:pointer;
background:#e74c3c;
border:none;
color:white;
}

</style>
</head>

<body>

<div id="leaderboard">
<h3>🏆 Forge Champions</h3>
<div id="top1">1. ---</div>
<div id="top2">2. ---</div>
<div id="top3">3. ---</div>
</div>

<h2>ANGLOFORGE COMBAT</h2>

<p>Enemies defeated: <span id="score">0</span></p>

<div id="enemy-sprite">👹</div>
<div id="enemyWord"></div>

<div class="hpbar"><div id="enemyHP" class="hpfill"></div></div>

<div id="player-sprite">🛡</div>

<div class="hpbar"><div id="playerHP" class="hpfill"></div></div>

<div id="mora-slots"></div>
<div id="cards"></div>

<button onclick="attack()">ATTACK</button>

<script>

let playerHP=5
let enemyHP=3
let score=0

let lastEnemy=null
let bossIndex=0
let isBoss=false
let playerSequence=[]

const bosses=[
"She sells seashells by the shore",
"Peter Piper picked peppers",
"Red lorry yellow lorry",
"He thrusts fists against the posts and still insists he sees the ghosts",
"The sixth sick sheik's sixth sheep's sick",
"Six slippery snails slid slowly",
"A tutor who tooted the flute tried to teach two young tooters to toot",
"Lesser leather never weathered wetter weather better",
"Imagine an imaginary menagerie manager imagining managing an imaginary menagerie",
"He thrusts fists against the posts and still insists he sees the ghosts"
]

const letterIPA={
a:"æ",b:"b",c:"k",d:"d",e:"ɛ",f:"f",g:"g",h:"h",
i:"ɪ",j:"dʒ",k:"k",l:"l",m:"m",n:"n",o:"oʊ",
p:"p",q:"k",r:"r",s:"s",t:"t",u:"ʌ",v:"v",
w:"w",x:"k",y:"j",z:"z"
}

const lexicon=[
{word:"cat",ipa:["k","æ","t"]},
{word:"ship",ipa:["ʃ","ɪ","p"]},
{word:"sheep",ipa:["ʃ","iː","p"]},
{word:"think",ipa:["θ","ɪ","ŋ","k"]},
{word:"stone",ipa:["s","t","oʊ","n"]},
{word:"dream",ipa:["d","r","iː","m"]},
{word:"storm",ipa:["s","t","ɔ","r","m"]},
{word:"cult",ipa:["k","ʌ","l","t"]},
{word:"void",ipa:["v","ɔɪ","d"]},
{word:"ritual",ipa:["r","ɪ","t","ʃ","u","əl"]},
{word:"eldritch",ipa:["ɛ","l","d","r","ɪ","t","ʃ"]},
{word:"shoggoth",ipa:["ʃ","ɒ","g","ə","θ"]},
{word:"cosmic",ipa:["k","ɒ","z","m","ɪ","k"]}
]

let currentEnemy

function spawnEnemy(){

playerSequence=[]

if(score>0 && score%10===0){

isBoss=true

let phrase=bosses[bossIndex%bosses.length]
bossIndex++

let words=phrase.toLowerCase().replace(/[^a-z\s]/g,"").split(" ")

let ipaSequence=[]

words.forEach(w=>{
let found=lexicon.find(e=>e.word===w)

if(found){
ipaSequence=ipaSequence.concat(found.ipa)
}else{
w.split("").forEach(l=>{
ipaSequence.push(letterIPA[l]||l)
})
}
})

currentEnemy={
word:phrase,
ipa:ipaSequence
}

enemyHP=5

}else{

isBoss=false

let enemy
do{
enemy=lexicon[Math.floor(Math.random()*lexicon.length)]
}while(enemy===lastEnemy)

lastEnemy=enemy
currentEnemy=enemy

enemyHP=Math.ceil(currentEnemy.ipa.length/2)

}

document.getElementById("enemyWord").innerText=currentEnemy.word.toUpperCase()

renderSlots()
renderCards()
updateBars()

}

function renderSlots(){

const container=document.getElementById("mora-slots")
container.innerHTML=""

currentEnemy.ipa.forEach(()=>{

let slot=document.createElement("div")
slot.className="slot"
if(isBoss) slot.classList.add("bossSlot")

container.appendChild(slot)

})

}

function renderCards(){

const cardsDiv=document.getElementById("cards")
cardsDiv.innerHTML=""

let pool=[]

currentEnemy.ipa.forEach(p=>{
if(!pool.includes(p)) pool.push(p)
})

let ipaPool=[...new Set(lexicon.flatMap(w=>w.ipa))]

while(pool.length<10){
let r=ipaPool[Math.floor(Math.random()*ipaPool.length)]
if(!pool.includes(r)) pool.push(r)
}

pool.sort(()=>Math.random()-0.5)

pool.forEach(p=>{

let card=document.createElement("div")
card.className="card"
card.innerText=p

card.onclick=()=>addMora(p)

cardsDiv.appendChild(card)

})

}

function addMora(p){

if(playerSequence.length>=currentEnemy.ipa.length) return

playerSequence.push(p)

let slots=document.querySelectorAll(".slot")
slots[playerSequence.length-1].innerText=p

}

function attack(){

if(playerSequence.join("")===currentEnemy.ipa.join("")){

score++
document.getElementById("score").innerText=score
spawnEnemy()

}else{

playerHP--

if(playerHP<=0){
alert("You were devoured by phonemes.")
location.reload()
}

updateBars()

}

}

function updateBars(){

document.getElementById("playerHP").style.width=(playerHP*20)+"%"
document.getElementById("enemyHP").style.width=(enemyHP*20)+"%"

}

function loadLeaderboard(){

document.getElementById("top1").innerText="1. player — 0"
document.getElementById("top2").innerText="2. challenger — 0"
document.getElementById("top3").innerText="3. trollson — 11"

}

spawnEnemy()
loadLeaderboard()

</script>

</body>
</html>
