<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>AngloForge Combat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#0a0f18;
color:white;
font-family:Arial, sans-serif;
text-align:center;
margin:0;
padding:20px;
}

#leaderboard{
border:1px solid #4fc3ff;
padding:10px;
margin-bottom:20px;
background:#111a28;
}

#leaderboard h3{
color:#ffd36b;
margin:5px 0;
}

#enemyWord{
font-size:26px;
color:#ffd36b;
margin-top:10px;
}

.hpbar{
width:200px;
height:12px;
background:#333;
margin:auto;
margin-top:5px;
}

.hpfill{
height:100%;
background:#e74c3c;
width:100%;
}

#enemy-sprite{
font-size:60px;
margin-top:10px;
}

#player-sprite{
font-size:50px;
}

#mora-slots{
margin-top:25px;
}

.slot{
display:inline-block;
width:50px;
height:50px;
border:2px solid #4fc3ff;
margin:4px;
line-height:50px;
font-size:22px;
background:#111a28;
cursor:pointer;
}

#cards{
margin-top:20px;
}

.card{
display:inline-block;
padding:10px 14px;
margin:5px;
border:1px solid #4fc3ff;
background:#162233;
font-size:22px;
cursor:pointer;
}

button{
padding:12px 25px;
margin-top:15px;
font-size:18px;
cursor:pointer;
background:#e74c3c;
border:none;
color:white;
}

.modebutton{
background:#162233;
border:1px solid #4fc3ff;
margin:5px;
}

a{
color:#7fd8ff;
}

</style>

</head>

<body>

<div id="leaderboard">
<h3>🏆 Forge Champions</h3>
<div id="top1">1. ---</div>
<div id="top2">2. ---</div>
<div id="top3">3. ---</div>
</div>

<h2>ANGLOFORGE COMBAT</h2>

<p>
Test your phonetic might in battle.<br>
The creatures of the abyss are forged from the sounds of English.
</p>

<p>
<a href="https://www.internationalphoneticassociation.org/IPAcharts/IPA_charts_EI/IPA_charts_EI.html" target="_blank">
Learn the battle moves
</a>
</p>

<button class="modebutton" onclick="startEndless()">Endless Arena</button>

<p>Enemies defeated: <span id="score">0</span></p>

<div id="enemy-sprite">👹</div>
<div id="enemyWord"></div>

<div class="hpbar"><div id="enemyHP" class="hpfill"></div></div>

<div id="player-sprite">🛡</div>

<div class="hpbar"><div id="playerHP" class="hpfill"></div></div>

<div id="mora-slots"></div>

<div id="cards"></div>

<button onclick="attack()">ATTACK</button>

<script>

let playerHP=5
let enemyHP=3
let score=0

let lastEnemy=null

const lexicon=[

{word:"signal",ipa:["s","ɪ","g","n","əl"]},
{word:"cipher",ipa:["s","aɪ","f","ər"]},
{word:"symbol",ipa:["s","ɪ","m","b","əl"]},
{word:"rune",ipa:["r","uː","n"]},
{word:"glyph",ipa:["g","l","ɪ","f"]},
{word:"mark",ipa:["m","ɑ","r","k"]},
{word:"trace",ipa:["t","r","eɪ","s"]},

{word:"gate",ipa:["g","eɪ","t"]},
{word:"portal",ipa:["p","ɔ","r","t","əl"]}
]

let currentEnemy

function randomEnemy(){

let enemy

do{
enemy=lexicon[Math.floor(Math.random()*lexicon.length)]
}while(enemy===lastEnemy)

lastEnemy=enemy
return enemy

}

function spawnEnemy(){

currentEnemy=randomEnemy()

document.getElementById("enemyWord").innerText=currentEnemy.word.toUpperCase()

enemyHP=Math.ceil(currentEnemy.ipa.length/2)

renderSlots()
renderCards()
updateBars()

}

function renderSlots(){

const box=document.getElementById("mora-slots")
box.innerHTML=""

currentEnemy.ipa.forEach(()=>{

let s=document.createElement("div")
s.className="slot"
s.onclick=function(){s.innerHTML=""}

box.appendChild(s)

})

}

function renderCards(){

const box=document.getElementById("cards")
box.innerHTML=""

let shuffled=[...currentEnemy.ipa].sort(()=>Math.random()-0.5)

shuffled.forEach(p=>{

let c=document.createElement("div")
c.className="card"
c.innerHTML=p

c.onclick=function(){placeCard(p)}

box.appendChild(c)

})

}

function placeCard(p){

let slots=document.querySelectorAll(".slot")

for(let s of slots){

if(s.innerHTML===""){
s.innerHTML=p
return
}

}

}

function attack(){

let slots=document.querySelectorAll(".slot")

for(let i=0;i<currentEnemy.ipa.length;i++){

if(slots[i].innerHTML!==currentEnemy.ipa[i]){

enemyTurn()
return

}

}

enemyHP--

if(enemyHP<=0){

score++
document.getElementById("score").innerText=score
spawnEnemy()

}else{

renderSlots()

}

updateBars()

}

function enemyTurn(){

playerHP--

if(playerHP<=0){

submitScore()
alert("Defeated. Score: "+score)

playerHP=5
score=0
document.getElementById("score").innerText=0

}

updateBars()

}

function updateBars(){

document.getElementById("enemyHP").style.width=(enemyHP/5*100)+"%"
document.getElementById("playerHP").style.width=(playerHP/5*100)+"%"

}

function startEndless(){

spawnEnemy()

}

function submitScore(){

let name=prompt("Forge Champion name:")

if(!name) return

let data=new FormData()

data.append("entry.860941965",name)
data.append("entry.923184678",score)

fetch("https://docs.google.com/forms/d/e/1FAIpQLSftQRRykk_Uwrv0qw9w2VlaKy6aKWO9u4VJZib3izXuPjJoNQ/formResponse",{
method:"POST",
mode:"no-cors",
body:data
})

setTimeout(loadLeaderboard,3000)

}

function loadLeaderboard(){

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTW7YErPi0xFWjGmWqftl7cXBPe1AoYhr9t3t_1sBf7tdSXK4eury7Ax6Fij_K058Y3HAcAS0sYPTk8/pub?output=csv")
.then(r=>r.text())
.then(text=>{

let rows=text.trim().split("\n").slice(1)

let scores=rows.map(r=>{
let c=r.split(",")
return {name:c[1],score:parseInt(c[2])}
})

scores=scores.sort((a,b)=>b.score-a.score).slice(0,3)

if(scores[0]) document.getElementById("top1").innerText="1. "+scores[0].name+" — "+scores[0].score
if(scores[1]) document.getElementById("top2").innerText="2. "+scores[1].name+" — "+scores[1].score
if(scores[2]) document.getElementById("top3").innerText="3. "+scores[2].name+" — "+scores[2].score

})

}

spawnEnemy()
loadLeaderboard()

</script>

</html>
