<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AngloForge Combat</title>

<style>

body{
background:#0a0f18;
color:white;
font-family:Arial, sans-serif;
text-align:center;
padding:10px;
}

#battlefield{
max-width:600px;
margin:auto;
}

#enemy-area{
margin-top:20px;
}

}

}

}

}

margin-top:20px;
}

}

.card{

.card:hover{

}

box-shadow:0 0 8px rgba(79,195,255,0.4);
transition:all 0.15s ease;
}

}

</style>
</head>

<body>

<div id="battlefield">

<h2>ANGLOFORGE COMBAT</h2>

<p>
Defeat the sounds.<br>
Arrange the phonemes in the correct order and strike.
</p>

<a class="forge-manual"
href="https://www.internationalphoneticassociation.org/IPAcharts/IPA_charts_EI/IPA_charts_EI.html"
target="_blank">
📜 Learn the battle moves
</a>

<div id="enemy-area">
<div id="enemy-sprite">👹</div>
<div id="enemy-name"></div>
<div class="hpbar">
<div id="enemy-health" class="hpfill"></div>
</div>
</div>

<div id="player-area">
<div id="player-sprite">🛡</div>
<div id="player-name">You</div>
<div class="hpbar">
<div id="player-health" class="hpfill"></div>
</div>
</div>

<div id="mora-slots"></div>

<div id="cards"></div>

<button onclick="validate()">ATTACK</button>

<div id="battle-log"></div>

</div>

<script>

var playerHP=5;

var enemyBag=[];
var enemyIndex=0;

/* ---------- CORE WORDS ---------- */

var enemies=[

{name:"abyss",sprite:"🐙",phonemes:["ə","b","ɪ","s"],mora:4,hp:2},
{name:"cult",sprite:"🕯️",phonemes:["k","ʌ","l","t"],mora:4,hp:2},
{name:"void",sprite:"🌑",phonemes:["v","ɔɪ","d"],mora:3,hp:1},
{name:"crypt",sprite:"🪦",phonemes:["k","r","ɪ","p","t"],mora:5,hp:2},
{name:"glyph",sprite:"📜",phonemes:["g","l","ɪ","f"],mora:4,hp:2},
{name:"horror",sprite:"👁️",phonemes:["h","ɔ","r","ə","r"],mora:5,hp:2},
{name:"eldritch",sprite:"🐍",phonemes:["ɛ","l","d","r","ɪ","tʃ"],mora:6,hp:3},
{name:"shoggoth",sprite:"🫧",phonemes:["ʃ","ɒ","g","ə","θ"],mora:5,hp:2},
{name:"ritual",sprite:"🔮",phonemes:["r","ɪ","tʃ","u","ə","l"],mora:6,hp:3},

{name:"cat",sprite:"👺",phonemes:["k","æ","t"],mora:3,hp:1},
{name:"dog",sprite:"👺",phonemes:["d","ɒ","g"],mora:3,hp:1},
{name:"sun",sprite:"🦂",phonemes:["s","ʌ","n"],mora:3,hp:1},
{name:"moon",sprite:"🐗",phonemes:["m","uː","n"],mora:3,hp:1},
{name:"light",sprite:"🌀",phonemes:["l","aɪ","t"],mora:3,hp:1},
{name:"red",sprite:"🌀",phonemes:["r","ɛ","d"],mora:3,hp:1},
{name:"think",sprite:"👹",phonemes:["θ","ɪ","ŋ","k"],mora:4,hp:2},
{name:"this",sprite:"👹",phonemes:["ð","ɪ","s"],mora:3,hp:2},
{name:"chair",sprite:"⚔️",phonemes:["tʃ","ɛ","r"],mora:3,hp:2},
{name:"jump",sprite:"⚔️",phonemes:["dʒ","ʌ","m","p"],mora:4,hp:2}

];

/* --------- AUTO EXPAND TO 333 -------- */

var base=[...enemies];

while(enemies.length<333){

var w=base[Math.floor(Math.random()*base.length)];

var clone={
name:w.name,
sprite:w.sprite,
phonemes:[...w.phonemes],
mora:w.mora,
hp:w.hp
};

enemies.push(clone);

}

/* --------- GAME ENGINE -------- */

var currentEnemy;
var enemyHP;

function loadEnemy(){

if(enemyIndex>=enemyBag.length){
enemyBag=[...enemies].sort(()=>Math.random()-0.5);
enemyIndex=0;
}

currentEnemy=enemyBag[enemyIndex];
enemyIndex++;

enemyHP=currentEnemy.hp;

var w=currentEnemy.name;
var formatted=w.charAt(0).toUpperCase()+w.slice(1);

document.getElementById("enemy-name").innerHTML=formatted;
document.getElementById("enemy-sprite").innerHTML=currentEnemy.sprite;

updateHealth();
renderSlots();
renderCards();

document.getElementById("battle-log").innerHTML="A word crawls from the abyss...";
}

function updateHealth(){

var enemyPercent=(enemyHP/currentEnemy.hp)*100;
document.getElementById("enemy-health").style.width=enemyPercent+"%";

var playerPercent=(playerHP/5)*100;
document.getElementById("player-health").style.width=playerPercent+"%";

}

function renderSlots(){

var box=document.getElementById("mora-slots");
box.innerHTML="";

for(var i=0;i<currentEnemy.mora;i++){

var d=document.createElement("div");
d.className="slot";

d.onclick=function(){
this.innerHTML="";
};

box.appendChild(d);

}

}

function placeCard(p){

var slots=document.getElementsByClassName("slot");

for(var i=0;i<slots.length;i++){

if(slots[i].innerHTML===""){
slots[i].innerHTML=p;
return;
}

}

}

function renderCards(){

var box=document.getElementById("cards");
box.innerHTML="";

var shuffled=[...currentEnemy.phonemes].sort(()=>Math.random()-0.5);

for(var i=0;i<shuffled.length;i++){

var p=shuffled[i];

var c=document.createElement("div");
c.className="card";

c.innerHTML=p;

c.onclick=function(){
placeCard(this.innerHTML);
};

box.appendChild(c);

}

}

function enemyAttack(){

playerHP--;

document.getElementById("battle-log").innerHTML="The creature claws at your tongue!";

updateHealth();

if(playerHP<=0){

document.getElementById("battle-log").innerHTML="The Forge resets...";

setTimeout(function(){

playerHP=5;
loadEnemy();

},1500);

}

}

function validate(){

var slots=document.getElementsByClassName("slot");
var correct=true;

for(var i=0;i<currentEnemy.phonemes.length;i++){

if(slots[i].innerHTML!=currentEnemy.phonemes[i]){
correct=false;
}

}

if(correct){

enemyHP--;

document.getElementById("battle-log").innerHTML=
"The word collapses into phonemic dust.";

updateHealth();

if(enemyHP<=0){

document.getElementById("battle-log").innerHTML=
"The beast dissolves into the void.";

setTimeout(loadEnemy,1000);

}else{

renderSlots();

}

}else{

document.getElementById("battle-log").innerHTML=
"The spell fails.";

for(var i=0;i<slots.length;i++){
slots[i].innerHTML="";
}

setTimeout(enemyAttack,700);

}

}

loadEnemy();

</script>

</body>
</html>
