<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AngloForge Combat</title>

<style>

body{
background:#0a0f18;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:10px;
}

#battlefield{
max-width:600px;
margin:auto;
}

#enemy-area{
margin-top:20px;
transition:0.1s;
}

#enemy-sprite{
font-size:70px;
}

#enemy-name{
font-size:22px;
color:#ffd36b;
}

.hpbar{
width:220px;
height:14px;
background:#222;
margin:6px auto;
border:1px solid #555;
}

.hpfill{
height:100%;
background:#e74c3c;
width:100%;
}

#player-area{
margin-top:20px;
}

#player-sprite{
font-size:60px;
}

#player-name{
font-size:20px;
color:#66d9ff;
}

#word-spotlight{
margin-top:25px;
font-size:32px;
letter-spacing:3px;
font-weight:bold;
color:#4fc3ff;
min-height:40px;
}

#kill-counter{
margin-top:10px;
font-size:18px;
color:#8bdfff;
}

#mora-slots{
margin-top:10px;
}

.slot{
display:inline-block;
width:55px;
height:55px;
border:2px solid #4fc3ff;
line-height:55px;
font-size:22px;
margin:5px;
background:#111a28;
font-family:"DejaVu Sans","Noto Sans",Arial;
}

#cards{
margin-top:15px;
}

.card{
display:inline-block;
padding:10px 14px;
border:1px solid #4fc3ff;
margin:5px;
font-size:22px;
cursor:pointer;
background:#162233;
font-family:"DejaVu Sans","Noto Sans",Arial;
}

.card:hover{
background:#22354d;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
background:#e74c3c;
border:none;
color:white;
}

#battle-log{
margin-top:15px;
min-height:30px;
color:#ccc;
}

.flash{
animation:flash 0.2s;
}

@keyframes flash{
0%{background:#ffffff;}
100%{background:#0a0f18;}
}

.shake{
animation:shake 0.2s;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(6px,0);}
50%{transform:translate(-6px,0);}
75%{transform:translate(6px,0);}
100%{transform:translate(0,0);}
}

</style>

</head>

<body>

<div id="battlefield">

<h2>ANGLOFORGE COMBAT</h2>

<p>
Defeat the sounds.<br>
Arrange the phonemes in the correct order and strike.
</p>

<div id="enemy-area">
<div id="enemy-sprite">👹</div>
<div id="enemy-name"></div>

<div class="hpbar">
<div id="enemy-health" class="hpfill"></div>
</div>
</div>

<div id="player-area">
<div id="player-sprite">🛡</div>
<div id="player-name">You</div>

<div class="hpbar">
<div id="player-health" class="hpfill"></div>
</div>
</div>

<div id="word-spotlight"></div>

<div id="kill-counter">Enemies defeated: 0</div>

<div id="mora-slots"></div>

<div id="cards"></div>

<button onclick="validate()">ATTACK</button>

<div id="battle-log"></div>

</div>

<script>

/* AUDIO ENGINE */

var audioCtx=new(window.AudioContext||window.webkitAudioContext)();

function playHit(){

var o=audioCtx.createOscillator();
var g=audioCtx.createGain();

o.type="square";
o.frequency.value=700;

o.connect(g);
g.connect(audioCtx.destination);

g.gain.setValueAtTime(0.25,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.12);

o.start();
o.stop(audioCtx.currentTime+0.12);

}

function playEnemy(){

var o=audioCtx.createOscillator();
var g=audioCtx.createGain();

o.type="sawtooth";
o.frequency.value=130;

o.connect(g);
g.connect(audioCtx.destination);

g.gain.setValueAtTime(0.3,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.25);

o.start();
o.stop(audioCtx.currentTime+0.25);

}

/* GAME */

var playerHP=5;
var kills=0;
var startTime=0;

var enemies=[

{name:"Stop Soldier",sprite:"👺",word:"pan",phonemes:["p","æ","n"],mora:3,hp:1},
{name:"Stop Soldier",sprite:"👺",word:"bat",phonemes:["b","æ","t"],mora:3,hp:1},

{name:"Nasal Beast",sprite:"🐗",word:"man",phonemes:["m","æ","n"],mora:3,hp:1},

{name:"Airflow Fiend",sprite:"🦂",word:"fan",phonemes:["f","æ","n"],mora:3,hp:1},

{name:"Tooth Demon",sprite:"👹",word:"think",phonemes:["θ","ɪ","ŋ","k"],mora:4,hp:2},

{name:"Forge Knight",sprite:"⚔️",word:"chair",phonemes:["tʃ","ɛ","r"],mora:3,hp:2},

{name:"Liquid Spirit",sprite:"🌀",word:"red",phonemes:["r","ɛ","d"],mora:3,hp:2},

{name:"Flap Assassin",sprite:"🗡",word:"water",phonemes:["w","ɔ","ɾ","ə","r"],mora:5,hp:2},

{name:"Cluster Titan",sprite:"🗿",word:"strong",phonemes:["s","t","r","ɔ","ŋ"],mora:5,hp:3}

];

var currentEnemy;
var enemyHP;

function showWord(){

document.getElementById("word-spotlight").innerHTML=
currentEnemy.word.toUpperCase();

}

function loadEnemy(){

var r=Math.floor(Math.random()*enemies.length);

currentEnemy=enemies[r];
enemyHP=currentEnemy.hp;

document.getElementById("enemy-name").innerHTML=currentEnemy.name;
document.getElementById("enemy-sprite").innerHTML=currentEnemy.sprite;

showWord();
updateHealth();
renderSlots();
renderCards();

startTime=Date.now();

document.getElementById("battle-log").innerHTML=
"A wild "+currentEnemy.name+" appears!";

}

function updateHealth(){

document.getElementById("enemy-health").style.width=
(enemyHP/currentEnemy.hp)*100+"%";

document.getElementById("player-health").style.width=
(playerHP/5)*100+"%";

}

function renderSlots(){

var box=document.getElementById("mora-slots");
box.innerHTML="";

for(var i=0;i<currentEnemy.mora;i++){

var d=document.createElement("div");
d.className="slot";

d.onclick=function(){this.innerHTML="";};

box.appendChild(d);

}

}

function placeCard(p){

var slots=document.getElementsByClassName("slot");

for(var i=0;i<slots.length;i++){

if(slots[i].innerHTML===""){
slots[i].innerHTML=p;
return;
}

}

}

function renderCards(){

var box=document.getElementById("cards");
box.innerHTML="";

var shuffled=[...currentEnemy.phonemes].sort(()=>Math.random()-0.5);

for(var i=0;i<shuffled.length;i++){

var c=document.createElement("div");
c.className="card";
c.innerHTML=shuffled[i];

c.onclick=function(){placeCard(this.innerHTML);};

box.appendChild(c);

}

}

function shakeEnemy(){

var e=document.getElementById("enemy-area");

e.classList.add("shake");

setTimeout(function(){e.classList.remove("shake");},200);

}

function flashScreen(){

document.body.classList.add("flash");

setTimeout(function(){document.body.classList.remove("flash");},200);

}

function enemyAttack(){

playerHP--;
playEnemy();

document.getElementById("battle-log").innerHTML=
currentEnemy.name+" strikes back!";

updateHealth();

if(playerHP<=0){

document.getElementById("battle-log").innerHTML=
"You were defeated. The Forge resets.";

setTimeout(function(){

playerHP=5;
kills=0;

document.getElementById("kill-counter").innerHTML=
"Enemies defeated: "+kills;

loadEnemy();

},1500);

}

}

function validate(){

var slots=document.getElementsByClassName("slot");
var correct=true;

for(var i=0;i<currentEnemy.phonemes.length;i++){

if(slots[i].innerHTML!=currentEnemy.phonemes[i]){
correct=false;
}

}

if(correct){

var time=(Date.now()-startTime)/1000;

var damage=1;

if(time<3){
damage=2;
document.getElementById("battle-log").innerHTML="⚡ PERFECT STRIKE!";
}else{
document.getElementById("battle-log").innerHTML="Direct hit!";
}

enemyHP-=damage;

flashScreen();
shakeEnemy();
playHit();

updateHealth();

if(enemyHP<=0){

kills++;

document.getElementById("kill-counter").innerHTML=
"Enemies defeated: "+kills;

document.getElementById("battle-log").innerHTML="Enemy defeated!";

setTimeout(loadEnemy,1000);

}else{

renderSlots();

}

}else{

document.getElementById("battle-log").innerHTML="Attack failed.";

for(var i=0;i<slots.length;i++){
slots[i].innerHTML="";
}

setTimeout(enemyAttack,700);

}

}

loadEnemy();

</script>

</body>
</html>
