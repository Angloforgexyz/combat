<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AngloForge Combat</title>

<style>

body{
background:#0a0f18;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:10px;
}

#battlefield{
max-width:600px;
margin:auto;
}

#enemy-area{
margin-top:20px;
}

#enemy-sprite{
font-size:70px;
}

#enemy-name{
font-size:26px;
color:#ffd36b;
margin-top:6px;
}

.hpbar{
width:220px;
height:14px;
background:#222;
margin:6px auto;
border:1px solid #555;
}

.hpfill{
height:100%;
background:#e74c3c;
width:100%;
}

#player-area{
margin-top:20px;
}

#player-sprite{
font-size:60px;
}

#player-name{
font-size:20px;
color:#66d9ff;
}

#mora-slots{
margin-top:25px;
}

.slot{
display:inline-block;
width:55px;
height:55px;
border:2px solid #4fc3ff;
line-height:55px;
font-size:22px;
margin:5px;
background:#111a28;
}

#cards{
margin-top:15px;
}

.card{
display:inline-block;
padding:10px 14px;
border:1px solid #4fc3ff;
margin:5px;
font-size:22px;
cursor:pointer;
background:#162233;
}

.card:hover{
background:#22354d;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
background:#e74c3c;
border:none;
color:white;
}

#battle-log{
margin-top:15px;
min-height:30px;
color:#ccc;
}

.forge-manual{
display:inline-block;
margin-top:12px;
padding:12px 26px;
background:#162233;
border:2px solid #4fc3ff;
color:#7fd8ff;
font-size:18px;
text-decoration:none;
border-radius:6px;
}

</style>
</head>

<body>

<div id="battlefield">

<h2>ANGLOFORGE COMBAT</h2>

<p>
Defeat the sounds.<br>
Arrange the phonemes in the correct order and strike.
</p>

<a class="forge-manual"
href="https://www.internationalphoneticassociation.org/IPAcharts/IPA_charts_EI/IPA_charts_EI.html"
target="_blank">
Learn the battle moves
</a>

<div id="enemy-area">
<div id="enemy-sprite">👹</div>
<div id="enemy-name"></div>

<div class="hpbar">
<div id="enemy-health" class="hpfill"></div>
</div>
</div>

<div id="player-area">

<div id="player-sprite">🛡</div>
<div id="player-name">You</div>

<div class="hpbar">
<div id="player-health" class="hpfill"></div>
</div>

</div>

<div id="mora-slots"></div>

<div id="cards"></div>

<button onclick="validate()">ATTACK</button>

<div id="battle-log"></div>

</div>

<script>

/* PLAYER */

var playerHP=5;

/* ENEMY WORD LIST (large pool) */

var enemies=[

{name:"cat",sprite:"👺",phonemes:["k","æ","t"],mora:3,hp:1},
{name:"dog",sprite:"👺",phonemes:["d","ɒ","g"],mora:3,hp:1},
{name:"sun",sprite:"🦂",phonemes:["s","ʌ","n"],mora:3,hp:1},
{name:"moon",sprite:"🐗",phonemes:["m","uː","n"],mora:3,hp:1},
{name:"map",sprite:"👹",phonemes:["m","æ","p"],mora:3,hp:1},
{name:"cap",sprite:"👹",phonemes:["k","æ","p"],mora:3,hp:1},
{name:"tap",sprite:"👹",phonemes:["t","æ","p"],mora:3,hp:1},
{name:"bed",sprite:"👹",phonemes:["b","ɛ","d"],mora:3,hp:1},
{name:"pen",sprite:"👹",phonemes:["p","ɛ","n"],mora:3,hp:1},
{name:"red",sprite:"👹",phonemes:["r","ɛ","d"],mora:3,hp:1},

{name:"ship",sprite:"👹",phonemes:["ʃ","ɪ","p"],mora:3,hp:2},
{name:"sheep",sprite:"👹",phonemes:["ʃ","iː","p"],mora:3,hp:2},
{name:"chip",sprite:"👹",phonemes:["tʃ","ɪ","p"],mora:3,hp:2},
{name:"jeep",sprite:"👹",phonemes:["dʒ","iː","p"],mora:3,hp:2},
{name:"think",sprite:"👹",phonemes:["θ","ɪ","ŋ","k"],mora:4,hp:2},
{name:"this",sprite:"👹",phonemes:["ð","ɪ","s"],mora:3,hp:2},

{name:"light",sprite:"🌑",phonemes:["l","aɪ","t"],mora:3,hp:2},
{name:"night",sprite:"🌑",phonemes:["n","aɪ","t"],mora:3,hp:2},
{name:"fight",sprite:"🌑",phonemes:["f","aɪ","t"],mora:3,hp:2},
{name:"sight",sprite:"🌑",phonemes:["s","aɪ","t"],mora:3,hp:2},

{name:"crypt",sprite:"🪦",phonemes:["k","r","ɪ","p","t"],mora:5,hp:2},
{name:"glyph",sprite:"📜",phonemes:["g","l","ɪ","f"],mora:4,hp:2},
{name:"abyss",sprite:"🐙",phonemes:["ə","b","ɪ","s"],mora:4,hp:2},
{name:"void",sprite:"🌑",phonemes:["v","ɔɪ","d"],mora:3,hp:1},
{name:"cult",sprite:"🕯️",phonemes:["k","ʌ","l","t"],mora:4,hp:2},

{name:"ritual",sprite:"🔮",phonemes:["r","ɪ","tʃ","u","ə","l"],mora:6,hp:3},
{name:"eldritch",sprite:"🐍",phonemes:["ɛ","l","d","r","ɪ","tʃ"],mora:6,hp:3},
{name:"horror",sprite:"👁️",phonemes:["h","ɔ","r","ə","r"],mora:5,hp:2},
{name:"shoggoth",sprite:"🫧",phonemes:["ʃ","ɒ","g","ə","θ"],mora:5,hp:2}

];

/* SHUFFLE BAG */

var enemyBag=[];
var enemyIndex=0;

function shuffleEnemies(){

enemyBag=[...enemies];

for(let i=enemyBag.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[enemyBag[i],enemyBag[j]]=[enemyBag[j],enemyBag[i]];
}

enemyIndex=0;

}

/* GAME STATE */

var currentEnemy;
var enemyHP;

/* LOAD ENEMY */

function loadEnemy(){

if(enemyIndex>=enemyBag.length){
shuffleEnemies();
}

currentEnemy=enemyBag[enemyIndex];
enemyIndex++;

enemyHP=currentEnemy.hp;

document.getElementById("enemy-name").innerHTML=
currentEnemy.name.charAt(0).toUpperCase()+currentEnemy.name.slice(1);

document.getElementById("enemy-sprite").innerHTML=currentEnemy.sprite;

updateHealth();
renderSlots();
renderCards();

document.getElementById("battle-log").innerHTML=
"A word crawls from the abyss...";

}

/* HEALTH */

function updateHealth(){

document.getElementById("enemy-health").style.width=
(enemyHP/currentEnemy.hp*100)+"%";

document.getElementById("player-health").style.width=
(playerHP/5*100)+"%";

}

/* SLOTS */

function renderSlots(){

var box=document.getElementById("mora-slots");
box.innerHTML="";

for(var i=0;i<currentEnemy.mora;i++){

var d=document.createElement("div");
d.className="slot";

d.onclick=function(){
this.innerHTML="";
};

box.appendChild(d);

}

}

/* CARDS */

function placeCard(p){

var slots=document.getElementsByClassName("slot");

for(var i=0;i<slots.length;i++){

if(slots[i].innerHTML===""){
slots[i].innerHTML=p;
return;
}

}

}

function renderCards(){

var box=document.getElementById("cards");
box.innerHTML="";

var shuffled=[...currentEnemy.phonemes].sort(()=>Math.random()-0.5);

for(var i=0;i<shuffled.length;i++){

var p=shuffled[i];

var c=document.createElement("div");
c.className="card";
c.innerHTML=p;

c.onclick=function(){
placeCard(this.innerHTML);
};

box.appendChild(c);

}

}

/* ENEMY ATTACK */

function enemyAttack(){

playerHP--;

document.getElementById("battle-log").innerHTML=
"The creature claws at your tongue!";

updateHealth();

if(playerHP<=0){

document.getElementById("battle-log").innerHTML=
"The Forge resets...";

setTimeout(function(){

playerHP=5;
loadEnemy();

},1500);

}

}

/* VALIDATE */

function validate(){

var slots=document.getElementsByClassName("slot");
var correct=true;

for(var i=0;i<currentEnemy.phonemes.length;i++){

if(slots[i].innerHTML!=currentEnemy.phonemes[i]){
correct=false;
}

}

if(correct){

enemyHP--;

document.getElementById("battle-log").innerHTML=
"The word collapses into phonemic dust.";

updateHealth();

if(enemyHP<=0){

document.getElementById("battle-log").innerHTML=
"The beast dissolves into the void.";

setTimeout(loadEnemy,1000);

}else{

renderSlots();

}

}else{

document.getElementById("battle-log").innerHTML=
"The spell fails.";

for(var i=0;i<slots.length;i++){
slots[i].innerHTML="";
}

setTimeout(enemyAttack,700);

}

}

/* START GAME */

shuffleEnemies();
loadEnemy();

</script>

</body>
</html>
```
