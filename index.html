<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AngloForge Combat</title>

<style>

body{
background:#0a0f18;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:10px;
}

#battlefield{
max-width:600px;
margin:auto;
}

#enemy-area{
margin-top:20px;
}

#enemy-sprite{
font-size:70px;
}

#enemy-name{
font-size:26px;
color:#ffd36b;
margin-top:6px;
}

.hpbar{
width:220px;
height:14px;
background:#222;
margin:6px auto;
border:1px solid #555;
}

.hpfill{
height:100%;
background:#e74c3c;
width:100%;
}

#player-sprite{
font-size:60px;
}

#player-name{
font-size:20px;
color:#66d9ff;
}

#mora-slots{
margin-top:25px;
}

.slot{
display:inline-block;
width:55px;
height:55px;
border:2px solid #4fc3ff;
line-height:55px;
font-size:22px;
margin:5px;
background:#111a28;
cursor:pointer;
}

#cards{
margin-top:15px;
}

.card{
display:inline-block;
padding:10px 14px;
border:1px solid #4fc3ff;
margin:5px;
font-size:22px;
cursor:pointer;
background:#162233;
}

.card:hover{
background:#22354d;
}

button{
margin-top:15px;
padding:12px 30px;
font-size:18px;
background:#e74c3c;
border:none;
color:white;
cursor:pointer;
}

.forge-manual{
display:inline-block;
margin-top:12px;
padding:12px 26px;
background:#162233;
border:2px solid #4fc3ff;
color:#7fd8ff;
text-decoration:none;
}

#score{
margin-top:10px;
font-size:18px;
color:#7fd8ff;
}

</style>

</head>

<body>

<div id="battlefield">

<h2>ANGLOFORGE COMBAT</h2>

<p>
Defeat the sounds.<br>
Arrange the phonemes in the correct order and strike.
</p>

<a class="forge-manual"
href="https://www.internationalphoneticassociation.org/IPAcharts/IPA_charts_EI/IPA_charts_EI.html"
target="_blank">
Learn the battle moves </a>

<div id="score">
Enemies defeated: <span id="score-value">0</span>
</div>

<div id="enemy-area">
<div id="enemy-sprite">👹</div>
<div id="enemy-name"></div>
<div class="hpbar"><div id="enemy-health" class="hpfill"></div></div>
</div>

<div id="player-area">
<div id="player-sprite">🛡</div>
<div id="player-name">You</div>
<div class="hpbar"><div id="player-health" class="hpfill"></div></div>
</div>

<div id="mora-slots"></div>
<div id="cards"></div>

<button onclick="validate()">ATTACK</button> <button onclick="submitScore()">Submit Score</button>

</div>

<script>

let playerHP = 5;
let enemiesDefeated = 0;

const wordBank = [

"cat","dog","sun","moon","map","cap","tap","bed","pen","red",
"ship","sheep","chip","jeep","think","this","light","night",
"fight","sight","stone","storm","plant","dream","flame","brave",
"frame","glass","grain","train","brain","plain","climb","crime",
"drift","shift","swift","craft","draft","shaft","trust","burst",
"curse","verse","nurse","first","world","sword","board","shore",
"score","floor","roar","door","tower","power","flower","river",
"silver","winter","hunter","singer","finger","danger","anger",
"dragon","shadow","hollow","yellow","follow","borrow","narrow",
"mirror","terror","horror","error","wonder","thunder","number",
"ember","member","remember","tremor","armor","harbor","harvest",
"forest","desert","ocean","island","valley","canyon","mountain",
"abyss","crypt","glyph","cult","void","ritual","eldritch",
"shoggoth","nameless","madness","cosmic","ancient","forgotten",
"whisper","shadowed","lurking","dread","voidborn","deepone","starspawn"

];

let enemies = wordBank.map(word => {

let phonemes = word.split("");

return {
name: word,
phonemes: phonemes,
mora: phonemes.length,
hp: Math.max(1,Math.floor(phonemes.length/3))
};

});

let enemyBag=[];
let enemyIndex=0;

function shuffleEnemies(){

enemyBag=[...enemies];

for(let i=enemyBag.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[enemyBag[i],enemyBag[j]]=[enemyBag[j],enemyBag[i]];
}

enemyIndex=0;

}

let currentEnemy;
let enemyHP;

function loadEnemy(){

if(enemyIndex>=enemyBag.length){
shuffleEnemies();
}

currentEnemy=enemyBag[enemyIndex];
enemyIndex++;

enemyHP=currentEnemy.hp;

document.getElementById("enemy-name").innerHTML=currentEnemy.name;

updateHealth();
renderSlots();
renderCards();

}

function updateHealth(){

document.getElementById("enemy-health").style.width =
(enemyHP/currentEnemy.hp*100)+"%";

document.getElementById("player-health").style.width =
(playerHP/5*100)+"%";

}

function renderSlots(){

let box=document.getElementById("mora-slots");
box.innerHTML="";

for(let i=0;i<currentEnemy.mora;i++){

let d=document.createElement("div");
d.className="slot";

d.onclick=function(){
this.innerHTML="";
};

box.appendChild(d);

}

}

function placeCard(p){

let slots=document.getElementsByClassName("slot");

for(let i=0;i<slots.length;i++){
if(slots[i].innerHTML===""){
slots[i].innerHTML=p;
return;
}
}

}

function renderCards(){

let box=document.getElementById("cards");
box.innerHTML="";

let shuffled=[...currentEnemy.phonemes].sort(()=>Math.random()-0.5);

shuffled.forEach(p=>{

let c=document.createElement("div");
c.className="card";
c.innerHTML=p;

c.onclick=function(){
placeCard(p);
};

box.appendChild(c);

});

}

function enemyAttack(){

playerHP--;

updateHealth();

if(playerHP<=0){

alert("You were defeated! Score: "+enemiesDefeated);

playerHP=5;
enemiesDefeated=0;
document.getElementById("score-value").innerHTML=enemiesDefeated;

shuffleEnemies();
loadEnemy();

}

}

function validate(){

let slots=document.getElementsByClassName("slot");
let correct=true;

for(let i=0;i<currentEnemy.phonemes.length;i++){

if(slots[i].innerHTML!=currentEnemy.phonemes[i]){
correct=false;
}

}

if(correct){

enemyHP--;

updateHealth();

if(enemyHP<=0){

enemiesDefeated++;
document.getElementById("score-value").innerHTML=enemiesDefeated;

setTimeout(loadEnemy,700);

}else{
renderSlots();
}

}else{

for(let s of slots){s.innerHTML="";}
setTimeout(enemyAttack,500);

}

}

function submitScore(){

let playerName = prompt("Enter your name for the Forge leaderboard:");

if(!playerName) return;

let formURL = "https://docs.google.com/forms/d/e/1FAIpQLSftQRRykk_Uwrv0qw9w2VlaKy6aKWO9u4VJZib3izXuPjJoNQ/formResponse";

let formData = new FormData();

formData.append("entry.860941965", playerName);
formData.append("entry.923184678", enemiesDefeated);

fetch(formURL,{
method:"POST",
mode:"no-cors",
body:formData
});

alert("Score submitted to the Forge!");

}

shuffleEnemies();
loadEnemy();

</script>

</body>
</html>
