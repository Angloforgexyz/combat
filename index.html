<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shoggoth Arena — Level 1</title>

<style>

body{
    background:#0b0b0f;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
}

h1{
    margin-top:20px;
}

#arena{
    margin-top:30px;
}

.word{
    font-size:40px;
    letter-spacing:10px;
}

.slot{
    border-bottom:3px solid #666;
    display:inline-block;
    width:40px;
    margin:5px;
    transition:0.2s;
}

.correct{
    color:#00ff88;
    text-shadow:0 0 10px #00ff88;
}

.wrong{
    color:#ff3c3c;
    text-shadow:0 0 10px #ff3c3c;
}

#phonemes{
    margin-top:30px;
}

.phoneme{
    display:inline-block;
    padding:12px 20px;
    margin:8px;
    background:#222;
    border-radius:6px;
    cursor:pointer;
    transition:0.2s;
}

.phoneme:hover{
    background:#444;
}

#kills{
    margin-top:30px;
    font-size:22px;
}

</style>
</head>

<body>

<h1>Shoggoth Arena</h1>

<div id="arena">
<div id="word" class="word"></div>
</div>

<div id="phonemes"></div>

<div id="kills">Kills: <span id="killCount">0</span></div>

<script>

const words = [
{word:"ship", phonemes:["ʃ","ɪ","p"]},
{word:"sheep", phonemes:["ʃ","iː","p"]},
{word:"sit", phonemes:["s","ɪ","t"]},
{word:"seat", phonemes:["s","iː","t"]}
];

let current;
let position = 0;
let kills = 0;

/* AUDIO ENGINE */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playCorrect(){
let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();

osc.frequency.value = 700;
osc.type = "triangle";

gain.gain.value = 0.1;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
osc.stop(audioCtx.currentTime + 0.15);
}

function playWrong(){
let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();

osc.frequency.value = 140;
osc.type = "sawtooth";

gain.gain.value = 0.15;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
osc.stop(audioCtx.currentTime + 0.25);
}

/* GAME */

function newWord(){

current = words[Math.floor(Math.random()*words.length)];
position = 0;

const wordDiv = document.getElementById("word");
wordDiv.innerHTML = "";

for(let i=0;i<current.phonemes.length;i++){

let span = document.createElement("span");
span.className="slot";
span.id="slot"+i;
span.textContent="_";

wordDiv.appendChild(span);

}

spawnPhonemes();

}

function spawnPhonemes(){

const pool = ["ʃ","s","ɪ","iː","p","t"];

const container = document.getElementById("phonemes");
container.innerHTML="";

pool.sort(()=>Math.random()-0.5);

pool.forEach(p=>{

let btn = document.createElement("div");
btn.className="phoneme";
btn.textContent=p;

btn.onclick=()=>choose(p);

container.appendChild(btn);

});

}

function choose(p){

const slot = document.getElementById("slot"+position);

if(p === current.phonemes[position]){

slot.textContent=p;
slot.classList.add("correct");

playCorrect();

position++;

if(position >= current.phonemes.length){

kills++;
document.getElementById("killCount").textContent=kills;

setTimeout(newWord,600);

}

}else{

slot.classList.add("wrong");

playWrong();

setTimeout(()=>{
slot.classList.remove("wrong");
},300);

}

}

newWord();

</script>

</body>
</html>
