<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shoggoth Arena</title>

<style>
body{
  background:black;
  color:#00ff9c;
  font-family:monospace;
  text-align:center;
  margin-top:80px;
}

#word{
  font-size:48px;
  letter-spacing:6px;
  margin:40px;
}

#kills{
  margin-top:30px;
  font-size:20px;
}

.green{color:#00ff9c;}
.red{color:#ff3b3b;}
</style>
</head>

<body>

<h1>Shoggoth Arena</h1>

<div id="word"></div>

<div id="kills">Kills: 0</div>

<script>

const WORD_POOL = [
"through","thought","tough","though","cough","bough","rough","thorough",
"nation","nature","vision","measure","pressure","treasure","azure",
"ship","sheep","chip","cheap","jeep","jump","judge",
"thin","then","thing","this",
"bat","bad","bag","back","bank","ban",
"coat","code","coal","goal",
"seat","seed","seam","seem",
"rice","rise","ice","eyes",
"lock","log","long","wrong",
"sing","singer","finger",
"shock","shack","shake",
"storm","story","store",
"flight","fight","light","night",
"stone","stun","stain",
"bread","break","breath",
"train","trail","trade",
"bright","bride","bridge",
"crowd","crown","brown",
"sound","round","found",
"mount","mouse","mouth",
"laugh","draft","craft",
"ghost","ghast","ghoul"
];

let kills=0;

function randomWord(){
  return WORD_POOL[Math.floor(Math.random()*WORD_POOL.length)];
}

function spawn(){
  document.getElementById("word").innerText=randomWord();
}

document.addEventListener("keydown",e=>{
  const word=document.getElementById("word");

  if(e.key==="f"){
    word.className="green";
    kills++;
    document.getElementById("kills").innerText="Kills: "+kills;
    setTimeout(()=>{spawn();word.className=""},200);
  }

  if(e.key==="j"){
    word.className="red";
    setTimeout(()=>{word.className=""},200);
  }

});

spawn();

</script>

</body>
</html>
