<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shoggoth Arena — Level 1</title>

<style>

body{
background:#0b0b0f;
color:white;
font-family:Arial,Helvetica,sans-serif;
text-align:center;
}

#enemyName{
font-size:32px;
margin-top:20px;
}

#moraSlots{
margin-top:30px;
}

.moraSlot{
display:inline-block;
border:2px solid white;
width:80px;
height:80px;
line-height:80px;
margin:5px;
font-size:28px;
}

#cards{
margin-top:40px;
}

.card{
display:inline-block;
border:2px solid white;
padding:15px;
margin:10px;
cursor:pointer;
font-size:26px;
}

.card:hover{
background:#333;
}

</style>
</head>

<body>

<h1>Shoggoth Arena</h1>

<div id="enemyName"></div>

<div id="moraSlots"></div>

<div id="cards"></div>

<script>

var currentEnemy;
var enemyHP;

var enemyBag=[];
var enemyIndex=0;

var enemies=[

{name:"sun",mora:["sʌn"],hp:1},
{name:"fan",mora:["fæn"],hp:1},
{name:"five",mora:["faɪv"],hp:1},
{name:"save",mora:["seɪv"],hp:1},
{name:"zoo",mora:["zuː"],hp:1},
{name:"measure",mora:["mɛ","ʒər"],hp:2},
{name:"house",mora:["haʊs"],hp:1},
{name:"judge",mora:["ʤʌʤ"],hp:1},
{name:"cheap",mora:["ʧiːp"],hp:1},
{name:"ship",mora:["ʃɪp"],hp:1},
{name:"sheep",mora:["ʃiːp"],hp:1},
{name:"sit",mora:["sɪt"],hp:1},
{name:"seat",mora:["siːt"],hp:1}

];

function loadEnemy(){

if(enemyIndex>=enemyBag.length){
enemyBag=[...enemies].sort(()=>Math.random()-0.5);
enemyIndex=0;
}

currentEnemy=enemies[0];

currentEnemy=enemyBag[enemyIndex];
enemyIndex++;

enemyHP=currentEnemy.hp;

document.getElementById("enemyName").innerText=currentEnemy.name;

renderMora();
renderCards();

}

function renderMora(){

var container=document.getElementById("moraSlots");
container.innerHTML="";

currentEnemy.mora.forEach(function(){

var slot=document.createElement("div");
slot.className="moraSlot";

container.appendChild(slot);

});

}

function renderCards(){

var container=document.getElementById("cards");
container.innerHTML="";

var shuffled=[...currentEnemy.mora].sort(()=>Math.random()-0.5);

shuffled.forEach(function(m){

var card=document.createElement("div");
card.className="card";
card.innerText=m;

card.onclick=function(){
playCard(m);
};

container.appendChild(card);

});

}

function playCard(m){

var slots=document.getElementsByClassName("moraSlot");

for(var i=0;i<slots.length;i++){

if(slots[i].innerText===""){

slots[i].innerText=m;
break;

}

}

checkAttack();

}

function checkAttack(){

var slots=document.getElementsByClassName("moraSlot");

var built=[];

for(var i=0;i<slots.length;i++){

if(slots[i].innerText==="") return;

built.push(slots[i].innerText);

}

var success=true;

for(var i=0;i<built.length;i++){

if(built[i]!==currentEnemy.mora[i]){
success=false;
}

}

if(success){

enemyHP--;

if(enemyHP<=0){
loadEnemy();
}else{
renderMora();
}

}else{

renderMora();

}

}

loadEnemy();

</script>

</body>
</html>
