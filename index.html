<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AngloForge Combat</title>

<style>

body{
background:#0a0f18;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:10px;
}

#battlefield{
max-width:600px;
margin:auto;
}

#leaderboard{
margin-bottom:20px;
padding:10px;
background:#111a28;
border:1px solid #4fc3ff;
}

#leaderboard h3{
margin:5px 0;
color:#ffd36b;
}

#enemy-area{
margin-top:20px;
}

#enemy-sprite{
font-size:70px;
}

#enemy-name{
font-size:26px;
color:#ffd36b;
margin-top:6px;
}

.hpbar{
width:220px;
height:14px;
background:#222;
margin:6px auto;
border:1px solid #555;
}

.hpfill{
height:100%;
background:#e74c3c;
width:100%;
}

#player-sprite{
font-size:60px;
}

#mora-slots{
margin-top:25px;
}

.slot{
display:inline-block;
width:55px;
height:55px;
border:2px solid #4fc3ff;
line-height:55px;
font-size:22px;
margin:5px;
background:#111a28;
cursor:pointer;
}

#cards{
margin-top:15px;
}

.card{
display:inline-block;
padding:10px 14px;
border:1px solid #4fc3ff;
margin:5px;
font-size:22px;
cursor:pointer;
background:#162233;
}

button{
margin-top:15px;
padding:12px 30px;
font-size:18px;
background:#e74c3c;
border:none;
color:white;
cursor:pointer;
}

.forge-manual{
display:inline-block;
margin-top:12px;
padding:12px 26px;
background:#162233;
border:2px solid #4fc3ff;
color:#7fd8ff;
text-decoration:none;
}

</style>
</head>

<body>

<div id="battlefield">

<div id="leaderboard">
<h3>🏆 Forge Champions</h3>
<div id="top1">1. ---</div>
<div id="top2">2. ---</div>
<div id="top3">3. ---</div>
</div>

<h2>ANGLOFORGE COMBAT</h2>

<p>
Test your phonetic might in battle.<br>
The creatures of the abyss are forged from the sounds of English.<br>
Arrange the phonemes correctly to strike them down.
</p>

<a class="forge-manual"
href="https://www.internationalphoneticassociation.org/IPAcharts/IPA_charts_EI/IPA_charts_EI.html"
target="_blank">
Learn the battle moves
</a>

<div id="score">
Enemies defeated: <span id="score-value">0</span>
</div>

<div id="enemy-area">
<div id="enemy-sprite">👹</div>
<div id="enemy-name"></div>
<div class="hpbar"><div id="enemy-health" class="hpfill"></div></div>
</div>

<div id="player-area">
<div id="player-sprite">🛡</div>
<div class="hpbar"><div id="player-health" class="hpfill"></div></div>
</div>

<div id="mora-slots"></div>
<div id="cards"></div>

<button onclick="validate()">ATTACK</button>

</div>

<script>

let playerHP=5;
let enemiesDefeated=0;

const leaderboardURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTW7YErPi0xFWjGmWqftl7cXBPe1AoYhr9t3t_1sBf7tdSXK4eury7Ax6Fij_K058Y3HAcAS0sYPTk8/pub?output=csv";

function loadLeaderboard(){

fetch(leaderboardURL)
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n").slice(1);

let scores=rows.map(r=>{
let c=r.split(",");
return{
name:c[1],
score:parseInt(c[2])
};
}).filter(x=>x.name && !isNaN(x.score));

scores.sort((a,b)=>b.score-a.score);

if(scores[0])
document.getElementById("top1").innerHTML="1. "+scores[0].name+" — "+scores[0].score;

if(scores[1])
document.getElementById("top2").innerHTML="2. "+scores[1].name+" — "+scores[1].score;

if(scores[2])
document.getElementById("top3").innerHTML="3. "+scores[2].name+" — "+scores[2].score;

});

}

const lexicon=[
{word:"cat",ipa:["k","æ","t"]},
{word:"ship",ipa:["ʃ","ɪ","p"]},
{word:"sheep",ipa:["ʃ","iː","p"]},
{word:"dog",ipa:["d","ɔ","g"]},
{word:"think",ipa:["θ","ɪ","ŋ","k"]},
{word:"this",ipa:["ð","ɪ","s"]},
{word:"stone",ipa:["s","t","oʊ","n"]},
{word:"storm",ipa:["s","t","ɔ","r","m"]},
{word:"plant",ipa:["p","l","æ","n","t"]},
{word:"dream",ipa:["d","r","iː","m"]},
{word:"flame",ipa:["f","l","eɪ","m"]},
{word:"glass",ipa:["g","l","æ","s"]},
{word:"train",ipa:["t","r","eɪ","n"]},
{word:"brain",ipa:["b","r","eɪ","n"]},
{word:"swift",ipa:["s","w","ɪ","f","t"]},
{word:"craft",ipa:["k","r","æ","f","t"]},
{word:"trust",ipa:["t","r","ʌ","s","t"]},
{word:"world",ipa:["w","ɜ","r","l","d"]},
{word:"shore",ipa:["ʃ","ɔ","r"]},
{word:"river",ipa:["r","ɪ","v","ər"]},
{word:"abyss",ipa:["ə","b","ɪ","s"]},
{word:"crypt",ipa:["k","r","ɪ","p","t"]},
{word:"glyph",ipa:["g","l","ɪ","f"]},
{word:"cult",ipa:["k","ʌ","l","t"]},
{word:"void",ipa:["v","ɔɪ","d"]},
{word:"ritual",ipa:["r","ɪ","t","ʃ","u","əl"]},
{word:"eldritch",ipa:["ɛ","l","d","r","ɪ","t","ʃ"]},
{word:"shoggoth",ipa:["ʃ","ɒ","g","ə","θ"]},
{word:"madness",ipa:["m","æ","d","n","ə","s"]},
{word:"cosmic",ipa:["k","ɒ","z","m","ɪ","k"]}
];

let enemyBag=[];
let enemyIndex=0;

function shuffleEnemies(){
enemyBag=[...lexicon];
for(let i=enemyBag.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[enemyBag[i],enemyBag[j]]=[enemyBag[j],enemyBag[i]];
}
enemyIndex=0;
}

let currentEnemy;
let enemyHP;

function loadEnemy(){

if(enemyIndex>=enemyBag.length) shuffleEnemies();

currentEnemy=enemyBag[enemyIndex++];
enemyHP=Math.max(1,Math.floor(currentEnemy.ipa.length/2));

document.getElementById("enemy-name").innerHTML=currentEnemy.word;

updateHealth();
renderSlots();
renderCards();

}

function updateHealth(){

document.getElementById("enemy-health").style.width=
(enemyHP/(Math.max(1,Math.floor(currentEnemy.ipa.length/2)))*100)+"%";

document.getElementById("player-health").style.width=
(playerHP/5*100)+"%";

}

function renderSlots(){

let box=document.getElementById("mora-slots");
box.innerHTML="";

for(let i=0;i<currentEnemy.ipa.length;i++){

let d=document.createElement("div");
d.className="slot";
d.onclick=function(){this.innerHTML="";};

box.appendChild(d);

}

}

function placeCard(p){

let slots=document.getElementsByClassName("slot");

for(let i=0;i<slots.length;i++){
if(slots[i].innerHTML===""){
slots[i].innerHTML=p;
return;
}
}

}

function renderCards(){

let box=document.getElementById("cards");
box.innerHTML="";

let shuffled=[...currentEnemy.ipa].sort(()=>Math.random()-0.5);

shuffled.forEach(p=>{

let c=document.createElement("div");
c.className="card";
c.innerHTML=p;

c.onclick=function(){placeCard(p);};

box.appendChild(c);

});

}

function submitScore(score){

let name=prompt("Forge Champion name:");

if(!name) return;

let formURL="https://docs.google.com/forms/d/e/1FAIpQLSftQRRykk_Uwrv0qw9w2VlaKy6aKWO9u4VJZib3izXuPjJoNQ/formResponse";

let data=new FormData();

data.append("entry.860941965",name);
data.append("entry.923184678",score);

fetch(formURL,{
method:"POST",
mode:"no-cors",
body:data
});

}

function enemyAttack(){

playerHP--;

updateHealth();

if(playerHP<=0){

submitScore(enemiesDefeated);

alert("Defeated. Score: "+enemiesDefeated);

playerHP=5;
enemiesDefeated=0;

document.getElementById("score-value").innerHTML=0;

shuffleEnemies();
loadEnemy();

}

}

function validate(){

let slots=document.getElementsByClassName("slot");
let correct=true;

for(let i=0;i<currentEnemy.ipa.length;i++){
if(slots[i].innerHTML!=currentEnemy.ipa[i]) correct=false;
}

if(correct){

enemyHP--;

updateHealth();

if(enemyHP<=0){

enemiesDefeated++;
document.getElementById("score-value").innerHTML=enemiesDefeated;

setTimeout(loadEnemy,700);

}else{
renderSlots();
}

}else{

for(let s of slots) s.innerHTML="";
setTimeout(enemyAttack,500);

}

}

shuffleEnemies();
loadEnemy();
loadLeaderboard();

</script>

</body>
</html>
